<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipo do triângulo</title>
</head>
<body>
    <script>
        function tipoTriangulo(l1=0, l2=0, l3=0) {
    if (l1 == l2 && l2 == l3) {
        return "O triângulo é equilátero."
    } else if (l1 == l2 || l1 == l3 || l2 == l3) {
        return "O triângulo é isósceles."
    } else {
        return "O triângulo é escaleno."
    }
}
let lado1 = prompt("Digite o comprimento do primeiro lado do triângulo:")
let lado2 = prompt("Digite o comprimento do segundo lado do triângulo:")
let lado3 = prompt("Digite o comprimento do terceiro lado do triângulo:")
lado1 = Number(lado1)
lado2 = Number(lado2)
lado3 = Number(lado3)
alert(tipoTriangulo(lado1, lado2, lado3))
    </script>
</body>
</html>
