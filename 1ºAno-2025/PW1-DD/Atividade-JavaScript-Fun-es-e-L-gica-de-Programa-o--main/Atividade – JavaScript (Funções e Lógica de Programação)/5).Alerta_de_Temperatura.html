<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerta de temperatura</title>
</head>
<body>
    <script>
        function checarTemperatura(temperatura=0) {
    if (temperatura < 10) {
        return "Alerta de frio!"
    } else if (temperatura >= 10 && temperatura <= 25) {
        return "Temperatura ideal."
    } else {
        return "Alerta de calor!"}
}
let temp = prompt("Digite a temperatura atual em °C:")
temp = Number(temp)
alert(checarTemperatura(temp))
    </script>
</body>
</html>
