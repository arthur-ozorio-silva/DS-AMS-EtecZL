<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de dia da semana</title>
</head>
<body>
    <script>
        function nomeDoDia(numero=0) {
            switch (numero) {
                case 1:
                    return "Domingo"
                case 2:
                    return "Segunda-feira"
                case 3:
                    return "Terça-feira"
                case 4:
                    return "Quarta-feira"
                case 5:
                    return "Quinta-feira"
                case 6:
                    return "Sexta-feira"
                case 7:
                    return "Sábado"
                default:
                    return "Número inválido"
            }
        }
        let diaNumero = prompt("Digite um número de 1 a 7 para saber o dia da semana correspondente:")
        diaNumero = Number(diaNumero)
        alert(nomeDoDia(diaNumero))
    </script>
</body>
</html>
