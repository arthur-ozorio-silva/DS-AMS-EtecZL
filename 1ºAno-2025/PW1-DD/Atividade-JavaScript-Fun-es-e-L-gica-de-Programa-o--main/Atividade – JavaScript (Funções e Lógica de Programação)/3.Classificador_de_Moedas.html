<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classificador de moedas</title>
</head>
<body>
    <script>
        function classificarMoeda(valor=0) {
    if (valor === 0.01) {
        return "Moeda de 1 centavo"
    } else if (valor === 0.05) {
        return "Moeda de 5 centavos"
    } else if (valor === 0.10) {
        return "Moeda de 10 centavos"
    } else if (valor === 0.25) {
        return "Moeda de 25 centavos"
    } else if (valor === 0.50) {
        return "Moeda de 50 centavos"
    } else if (valor === 1.00) {
        return "Moeda de 1 real"
    } else {
        return "Valor desconhecido"
    }
}
let valorMoeda = prompt("Digite o valor da moeda (Cada centavo equivale a 0.01):");
valorMoeda = Number(valorMoeda)
alert(classificarMoeda(valorMoeda))
    </script>
</body>
</html>
