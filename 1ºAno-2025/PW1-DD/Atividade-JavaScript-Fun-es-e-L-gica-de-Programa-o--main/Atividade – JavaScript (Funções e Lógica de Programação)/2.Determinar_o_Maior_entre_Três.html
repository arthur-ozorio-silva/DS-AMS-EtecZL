<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Determinando0 o maior entre três números</title>
</head>
<body>
    <script>
        function maiorEntreTres(num1=0, num2=0, num3=0) {
    if (num1 >= num2 && num1 >= num3) {
        return num1 + " é o maior número."
    } else if (num2 >= num1 && num2 >= num3) {
        return num2 + " é o maior número."
    } else {
        return num3 + " é o maior número."
    }
}
let numero1 = prompt("Digite o primeiro número:")
let numero2 = prompt("Digite o segundo número:")
let numero3 = prompt("Digite o terceiro número:")
numero1 = Number(numero1)
numero2 = Number(numero2)
numero3 = Number(numero3)
alert(maiorEntreTres(numero1, numero2, numero3))
    </script>
</body>
</html>
