<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Login jogadores</title>
</head>
<body>
    <header>
        <img src="../midia/logo.png" alt="Logo Strive Games" class="logo">
        <h1>Strive Games</h1>
        <h2>Torne-se uma lenda do E-Sports aqui!</h2>

        <nav>
            <a href="sobre nós.html">Sobre nós</a>
            <a href="index.html">Início</a>
        </nav>
    </header>

    <main>
        <h3>Cadastro</h3>

        <form>
            <label for="nome">Nome</label>
            <input type="text" id="nome">

            <label for="idade">Idade</label>
            <input type="number" id="idade">

            <p>Que jogo pretende jogar?</p>

            <div class="jogos">
                <label><input type="checkbox"> <img src="../midia/logo_lol.png" alt="Logo LoL"></label>
                <label><input type="checkbox"> <img src="../midia/CS2-logo.png" alt="Logo CS2"></label>
                <label><input type="checkbox"> <img src="../midia/Valorant-logo.png" alt="Logo Valorant"></label>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </main>
</body>
</html>
